/* ================= MUTATIONS ================= */
let persistT=null;
function touchDraft(rerender){
  clearTimeout(persistT);
  persistT=setTimeout(()=>{try{store.set(DRAFT_KEY,JSON.stringify(draft));}catch(e){}},300);
  invalidate();
  if(rerender!==false)render();
  else renderHeader();
}
function toast(msg,err){
  const t=document.getElementById("toast");
  t.textContent=msg;t.className=err?"err show":"show";
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2400);
}
function publish(){
  published=clone(draft);
  store.set(PUB_KEY,JSON.stringify(published));
  store.set(DRAFT_KEY,JSON.stringify(draft));
  touchDraft();
  toast("✓ Опубликовано — изменения видны всем");
}
function resetDraft(){
  draft=clone(published);
  store.set(DRAFT_KEY,JSON.stringify(draft));
  touchDraft();
  toast("Draft сброшен к опубликованной версии");
}
function exportJSON(){
  try{
    const blob=new Blob([JSON.stringify(draft,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);a.download="data.json";
    document.body.appendChild(a);a.click();
    setTimeout(()=>{try{URL.revokeObjectURL(a.href);a.remove();}catch(e){}},800);
    toast("data.json скачан");
  }catch(e){toast("Экспорт не удался: "+e.message,true);}
}
function importJSON(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      draft=migrate(JSON.parse(r.result));
      touchDraft();
      toast("Импортировано в draft — проверь и нажми «Сохранить»");
    }catch(e){toast("Битый JSON: "+e.message,true);}
  };
  r.readAsText(file);
}
function recordMatch(){
  const v=id=>{const el=document.getElementById(id);return el?el.value:"";};
  const p1=v("rm_p1"),p2=v("rm_p2");
  if(!p1||!p2){toast("Выбери обоих игроков",true);return;}
  if(p1===p2){toast("Игрок не может играть сам с собой",true);return;}
  const s1=+v("rm_s1"),s2=+v("rm_s2");
  if(isNaN(s1)||isNaN(s2)||s1<0||s2<0||(s1+s2)<=0){toast("Некорректный счёт",true);return;}
  draft.matches.push({id:"m"+uid(),cat:v("rm_cat"),p1,p2,s1,s2,date:v("rm_date")||new Date().toISOString().slice(0,10)});
  touchDraft();
  toast("⚔️ Матч записан");
}
function snapshotSeason(){
  const d=new Date();
  const seas=["Winter","Winter","Spring","Spring","Spring","Summer","Summer","Summer","Autumn","Autumn","Autumn","Winter"][d.getMonth()];
  draft.seasons.push({id:"sn"+uid(),name:seas+" "+d.getFullYear(),date:d.toISOString().slice(0,10),
    entries:draft.players.map(p=>({player:p.id,tier:p.overall||"",points:playerPoints(draft,p),tiers:clone(p.tiers||{})}))});
  touchDraft();
  toast("📸 Снимок сезона создан");
}

/* ================= EVENTS ================= */
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-nav],[data-kit],[data-elokit],[data-elomode],[data-mkit],[data-mperiod],[data-season],[data-hofmode],[data-atab],[data-act],[data-player],[data-close],[data-cline],[data-chartmode],[data-cmpopen],[data-share]");
  if(!t)return;
  const ds=t.dataset;
  if(ds.close!==undefined&&t===e.target||ds.close&&t.classList.contains("pf-x")){closeLayer();return;}
  if(ds.close&&(t.classList.contains("ovl")||t.classList.contains("pf-x"))){closeLayer();return;}
  if(ds.nav){go(ds.nav);return;}
  if(ds.kit){state.kit=ds.kit;render();return;}
  if(ds.elokit){state.eloKit=ds.elokit;render();return;}
  if(ds.elomode){state.eloMode=ds.elomode;render();return;}
  if(ds.mkit){state.matchKit=ds.mkit;render();return;}
  if(ds.mperiod){state.matchPeriod=ds.mperiod;render();return;}
  if(ds.season!==undefined){state.seasonIdx=+ds.season;render();return;}
  if(ds.hofmode){state.hofMode=ds.hofmode;render();return;}
  if(ds.atab){state.atab=ds.atab;render();return;}
  if(ds.cline||ds.chartmode){
    if(ds.chartmode)state.chartMode=ds.chartmode;
    else{const off=state._chartOff||(state._chartOff={});off[ds.cline]=!off[ds.cline];}
    const pid=state._chartPid;
    const box=t.closest(".chartbox");
    if(box&&pid){const tmp=document.createElement("div");tmp.innerHTML=chartHTML(pid);box.replaceWith(tmp.firstChild);}
    return;}
  if(ds.cmpopen){renderCompare(ds.cmpopen,state.cmpWith);return;}
  if(ds.share){
    const url=(location.href.split("#")[0])+"#/"+state.route+"?player="+ds.share;
    try{
      if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(url).then(()=>toast("🔗 Ссылка скопирована"),()=>toast(url));
      else toast(url);
    }catch(e2){toast(url);}
    return;}
  if(ds.player){openProfile(ds.player);return;}
  if(ds.act)handleAction(ds.act,t);
});
document.addEventListener("input",e=>{
  const t=e.target;const ds=t.dataset||{};
  if(ds.pf&&ds.pid){
    const p=byId(draft.players,ds.pid);if(!p)return;
    if(ds.pf.indexOf("tier:")===0){p.tiers=p.tiers||{};const cid=ds.pf.slice(5);if(t.value)p.tiers[cid]=t.value;else delete p.tiers[cid];}
    else if(ds.pf==="tourneyPts")p.tourneyPts=+t.value||0;
    else p[ds.pf]=t.value;
    touchDraft(t.tagName==="SELECT");return;
  }
  if(ds.sf&&ds.sid){const s=byId(draft.seasons,ds.sid);if(s){s[ds.sf]=t.value;touchDraft(false);}return;}
  if(ds.se!==undefined&&ds.ei!==undefined&&ds.k){
    const s=byId(draft.seasons,ds.se);if(!s)return;const en=(s.entries||[])[+ds.ei];if(!en)return;
    if(ds.k.indexOf("tier:")===0){en.tiers=en.tiers||{};const cid=ds.k.slice(5);if(t.value)en.tiers[cid]=t.value;else delete en.tiers[cid];}
    else if(ds.k==="points")en.points=+t.value||0;
    else en[ds.k]=t.value;
    touchDraft(false);return;
  }
  if(ds.tif&&ds.ti!==undefined){const ti=draft.tiers[+ds.ti];if(ti){ti[ds.tif]=ds.tif==="points"?(+t.value||0):t.value;touchDraft(ds.tif!=="label"&&ds.tif!=="points");}return;}
  if(ds.cf&&ds.ci!==undefined){const cc=draft.categories[+ds.ci];if(cc){cc[ds.cf]=t.value;touchDraft(t.tagName==="SELECT");}return;}
  if(ds.mf){
    if(ds.mf==="smoothing"||ds.mf==="decay")draft.meta[ds.mf]=+t.value||0;
    else draft.meta[ds.mf]=t.value;
    touchDraft(false);renderHeader();return;
  }
  if(ds.cmpsel){state.cmpWith=t.value||null;renderCompare(ds.cmpsel,state.cmpWith);return;}
});
document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&(e.key==="k"||e.key==="K"||e.key==="л"||e.key==="Л")){e.preventDefault();openPalette();return;}
  if(e.key==="Escape"){closeLayer();return;}
  if(state.palOpen){
    const list=state._palList||[];
    if(e.key==="ArrowDown"){e.preventDefault();state._palSel=Math.min(list.length-1,(state._palSel||0)+1);renderPalList(document.getElementById("palin").value);}
    else if(e.key==="ArrowUp"){e.preventDefault();state._palSel=Math.max(0,(state._palSel||0)-1);renderPalList(document.getElementById("palin").value);}
    else if(e.key==="Enter"&&list[state._palSel]){openProfile(list[state._palSel].id);}
    return;
  }
  if(e.key==="Enter"&&e.target&&e.target.id==="adminpass")tryLogin();
});
function handleAction(act,t){
  const ds=t.dataset;
  switch(act){
    case "login":tryLogin();break;
    case "logout":state.authed=false;state.livePreview=false;go("tiers");break;
    case "livepreview":state.livePreview=!state.livePreview;render();toast(state.livePreview?"👁 Live Preview: публичные страницы показывают draft":"Live Preview выключен");break;
    case "publish":publish();break;
    case "resetdraft":if(confirm("Сбросить draft к опубликованной версии?"))resetDraft();break;
    case "export":exportJSON();break;
    case "import":{const f=document.getElementById("importfile");if(f){f.onchange=()=>{if(f.files[0])importJSON(f.files[0]);f.value="";};f.click();}break;}
    case "factory":if(confirm("Точно сбросить ВСЁ к заводским данным?")){store.del(PUB_KEY);store.del(DRAFT_KEY);published=migrate(DEFAULT_DATA());draft=clone(published);touchDraft();toast("Заводской сброс выполнен");}break;
    case "addplayer":draft.players.push({id:"p"+uid(),name:"NewPlayer",skin:"MHF_Steve",badge:"",tourneyPts:0,overall:"",tiers:{}});touchDraft();break;
    case "delplayer":{const p=byId(draft.players,ds.pid);if(p&&confirm("Удалить игрока "+p.name+"? Его матчи тоже будут удалены.")){draft.players=draft.players.filter(x=>x.id!==ds.pid);draft.matches=draft.matches.filter(m=>m.p1!==ds.pid&&m.p2!==ds.pid);touchDraft();}break;}
    case "recordmatch":recordMatch();break;
    case "delmatch":draft.matches=draft.matches.filter(m=>m.id!==ds.mid);touchDraft();break;
    case "addtourn":{
      const v=id=>{const el=document.getElementById(id);return el?el.value:"";};
      const ms=id=>{const el=document.getElementById(id);return el?[...el.selectedOptions].map(o=>o.value):[];};
      if(!v("rt_name")){toast("Дай турниру название",true);break;}
      draft.tournaments.push({id:"t"+uid(),name:v("rt_name"),short:v("rt_short"),date:v("rt_date")||new Date().toISOString().slice(0,10),first:ms("rt_1"),second:ms("rt_2"),third:ms("rt_3"),archived:false});
      touchDraft();toast("🏆 Турнир создан");break;}
    case "tarch":{const tt=byId(draft.tournaments,ds.tid);if(tt){tt.archived=!tt.archived;touchDraft();}break;}
    case "deltourn":if(confirm("Удалить турнир?")){draft.tournaments=draft.tournaments.filter(x=>x.id!==ds.tid);touchDraft();}break;
    case "snapshot":snapshotSeason();break;
    case "addseason":draft.seasons.push({id:"sn"+uid(),name:"Новый сезон",date:new Date().toISOString().slice(0,10),entries:[]});touchDraft();break;
    case "delseason":if(confirm("Удалить сезон из архива?")){draft.seasons=draft.seasons.filter(s=>s.id!==ds.sid);touchDraft();}break;
    case "seasontoggle":state.seasonEdit=state.seasonEdit===ds.sid?null:ds.sid;render();break;
    case "addseasonentry":{const s=byId(draft.seasons,ds.sid);if(s){s.entries=s.entries||[];s.entries.push({player:(draft.players[0]||{}).id||"",tier:"",points:0,tiers:{}});touchDraft();}break;}
    case "delseasonentry":{const s=byId(draft.seasons,ds.sid);if(s){s.entries.splice(+ds.ei,1);touchDraft();}break;}
    case "addhof":{
      const v=id=>{const el=document.getElementById(id);return el?el.value:"";};
      if(!v("rh_a")){toast("Укажи дату начала",true);break;}
      draft.hallOfFame.push({id:"h"+uid(),player:v("rh_p"),category:v("rh_c"),dateStart:v("rh_a"),dateEnd:v("rh_b")||""});
      touchDraft();toast("👑 Добавлено в Зал славы");break;}
    case "delhof":draft.hallOfFame=draft.hallOfFame.filter(h=>h.id!==ds.hid);touchDraft();break;
    case "addtier":draft.tiers.push({id:"T"+uid().slice(0,3).toUpperCase(),label:"X",color:"#8b8b98",points:0});touchDraft();break;
    case "deltier":if(confirm("Удалить тир?")){draft.tiers.splice(+ds.ti,1);touchDraft();}break;
    case "addcat":draft.categories.push({id:"c"+uid(),name:"New Kit",short:"NEW",icon:"star",color:"#8b8b98",desc:""});touchDraft();break;
    case "delcat":if(confirm("Удалить категорию? Матчи этой категории останутся, но потеряют привязку.")){draft.categories.splice(+ds.ci,1);touchDraft();}break;
    case "navtoggle":draft.meta.nav[ds.nk]=draft.meta.nav[ds.nk]===false?true:false;touchDraft();break;
  }
}
function tryLogin(){
  const inp=document.getElementById("adminpass");
  if(!inp)return;
  if(inp.value===String(draft.meta.adminPass)){
    state.authed=true;render();toast("Добро пожаловать, админ 🐑");
  }else{
    const box=document.getElementById("loginbox");
    if(box){box.classList.remove("shake");void box.offsetWidth;box.classList.add("shake");}
    inp.value="";inp.focus();
  }
}

/* ================= TOOLTIPS ================= */
const tipEl=()=>document.getElementById("tip");
document.addEventListener("mouseover",e=>{
  const t=e.target.closest("[data-tipcat],[data-tip]");
  const tip=tipEl();if(!tip)return;
  if(!t){tip.classList.remove("show");return;}
  let html="";
  if(t.dataset.tipcat){
    const c=ctx(),data=c.data;
    const cc=byId(data.categories,t.dataset.tipcat);
    if(cc){
      const best=bestInCat(data,c.R,cc.id);
      html='<div class="tip-h" style="color:'+cc.color+'">'+catIcon(cc,14)+' '+esc(cc.name)+'</div>'+
      (cc.desc?'<div class="tip-d">'+esc(cc.desc)+'</div>':"")+
      '<div class="tip-row"><span class="k">Сервер</span>'+ic("server",12,"color:var(--mut)")+' <b>'+esc(data.meta.server||"Aormio")+'</b></div>'+
      (best&&best.p?'<div class="tip-row"><span class="k">Лучший</span><img src="'+avSrc(best.p.skin,20)+'" alt=""><b>'+esc(best.p.name)+'</b>'+(best.v!=null?'<span style="color:var(--mut2);font-family:var(--mono);font-size:10px">ELO '+Math.round(best.v)+'</span>':"")+'</div>':"");
    }
  }else if(t.dataset.tip){
    html='<div class="tip-plain">'+esc(t.dataset.tip)+'</div>';
  }
  if(!html){tip.classList.remove("show");return;}
  tip.innerHTML=html;
  tip.classList.add("show");
  const r=t.getBoundingClientRect();
  const tw=tip.offsetWidth,th=tip.offsetHeight;
  let x=r.left+r.width/2-tw/2;
  x=clamp(x,8,(window.innerWidth||1200)-tw-8);
  let y=r.top-th-9;if(y<8)y=r.bottom+9;
  tip.style.left=x+"px";tip.style.top=y+"px";
});
document.addEventListener("mouseout",e=>{
  if(e.target.closest("[data-tipcat],[data-tip]")){const tip=tipEl();if(tip)tip.classList.remove("show");}
});

/* ================= COUNTERS / CONFETTI / SKELETON ================= */
function runCounters(root){
  const els=(root||document).querySelectorAll("[data-count]");
  els.forEach(el=>{
    if(el._done)return;el._done=true;
    const target=+el.dataset.count||0;
    const t0=performance.now(),dur=900;
    const step=now=>{
      const k=clamp((now-t0)/dur,0,1);
      const eased=1-Math.pow(1-k,3);
      el.textContent=String(Math.round(target*eased));
      if(k<1)requestAnimationFrame(step);
    };
    try{requestAnimationFrame(step);}catch(e){el.textContent=String(target);}
  });
}
function confettiBurst(){
  if(state.confettiDone)return;state.confettiDone=true;
  const cv=document.getElementById("confetti");if(!cv)return;
  let cx2=null;try{cx2=cv.getContext("2d");}catch(e){}
  if(!cx2)return;
  const W=cv.width=window.innerWidth||800,H=cv.height=window.innerHeight||600;
  const cols=["#a78bfa","#f472b6","#fbbf24","#34d399","#4da3ff"];
  const ps=[];for(let i=0;i<130;i++)ps.push({x:Math.random()*W,y:-20-Math.random()*H*0.5,vx:(Math.random()-0.5)*1.6,vy:1.8+Math.random()*2.6,s:4+Math.random()*5,r:Math.random()*Math.PI,vr:(Math.random()-0.5)*0.2,c:cols[i%cols.length]});
  const t0=performance.now();
  const tick=now=>{
    cx2.clearRect(0,0,W,H);
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;cx2.save();cx2.translate(p.x,p.y);cx2.rotate(p.r);cx2.fillStyle=p.c;cx2.globalAlpha=clamp(1-(now-t0)/2600,0,1);cx2.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.62);cx2.restore();});
    if(now-t0<2600)requestAnimationFrame(tick);else cx2.clearRect(0,0,W,H);
  };
  try{requestAnimationFrame(tick);}catch(e){}
}
function afterRender(){
  runCounters(document.getElementById("app"));
  if(state.route==="elo")try{confettiBurst();}catch(e){}
}

/* ================= BOOT ================= */
function showSkeleton(){
  document.getElementById("app").innerHTML='<div class="page"><div class="skel" style="height:120px;margin-bottom:18px;width:60%"></div><div class="skel" style="height:84px;margin-bottom:14px"></div><div class="skel" style="height:84px;margin-bottom:14px"></div><div class="skel" style="height:84px;margin-bottom:14px"></div><div class="skel" style="height:84px"></div></div>';
}
function applyHash(){
  let h="";try{h=location.hash||"";}catch(e){}
  const m=h.match(/#\/(\w+)/);
  if(m&&(NAV.some(n=>n[0]===m[1])||m[1]==="admin"))state.route=m[1];
  const pm=h.match(/player=([\w-]+)/);
  return pm?pm[1]:null;
}
function boot(){
  showSkeleton();
  // 1. localStorage
  let pub=null;
  try{const raw=store.get(PUB_KEY);if(raw)pub=JSON.parse(raw);}catch(e){}
  const finish=()=>{
    published=migrate(pub||DEFAULT_DATA());
    let dr=null;
    try{const raw=store.get(DRAFT_KEY);if(raw)dr=JSON.parse(raw);}catch(e){}
    draft=migrate(dr||clone(published));
    const openP=applyHash();
    setTimeout(()=>{render();if(openP)try{openProfile(openP);}catch(e){}},420);
  };
  if(pub){finish();return;}
  // 2. data.json
  let fetched=false;
  try{
    if(typeof fetch==="function"){
      fetched=true;
      fetch("data.json",{cache:"no-store"}).then(r=>r.ok?r.json():null).catch(()=>null).then(j=>{if(j)pub=j;finish();});
    }
  }catch(e){}
  if(!fetched)finish();
}
try{window.addEventListener("hashchange",()=>{const prev=state.route;const p=applyHash();if(state.route!==prev)render();if(p)try{openProfile(p);}catch(e){}});}catch(e){}
window.BST={get state(){return state;},go,render,openProfile,D,ctx,exportJSON};
boot();
</script>
